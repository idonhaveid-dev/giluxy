name: Reservation monitor

on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GILUXY reservation monitor
        run: |
          curl --fail --show-error --silent https://giluxy.vercel.app/api/run-reservation-monitors
